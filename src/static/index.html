<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Animated Git branch lines background -->
    <canvas id="git-bg-canvas"></canvas>

    <header>
      <!-- Mascots from octodex.github.com -->
      <div class="mascot-container">
        <img class="mascot mascot-left" src="https://octodex.github.com/images/labtocat.png" alt="Octocat mascot" />
        <img class="mascot mascot-right" src="https://octodex.github.com/images/hula_tocat.gif" alt="Octocat mascot" />
      </div>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
      <div id="user-controls">
        <div id="user-status">
          <button id="login-button" class="icon-button">
            <span class="user-icon">👤</span>
            <span>Login</span>
          </button>
          <div id="user-info" class="hidden">
            <span id="display-name"></span>
            <button id="logout-button">Logout</button>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section id="activities-container">
        <div class="main-content-layout">
          <!-- Left Sidebar for Filters -->
          <aside class="sidebar-filters">
            <h3>Filter Activities</h3>
            <!-- Search Box -->
            <div class="search-box">
              <input
                type="text"
                id="activity-search"
                placeholder="Search activities..."
              />
              <button id="search-button" aria-label="Search">
                <span class="search-icon">🔍</span>
              </button>
            </div>

            <div class="filter-container">
              <div class="filter-label">Filter by category:</div>
              <div class="category-filters" id="category-filters">
                <button class="category-filter active" data-category="all">
                  All
                </button>
                <button class="category-filter" data-category="sports">
                  Sports
                </button>
                <button class="category-filter" data-category="arts">
                  Arts
                </button>
                <button class="category-filter" data-category="academic">
                  Academic
                </button>
                <button class="category-filter" data-category="community">
                  Community
                </button>
                <button class="category-filter" data-category="technology">
                  Technology
                </button>
              </div>
            </div>

            <!-- Day Filter -->
            <div class="filter-container day-filter-container">
              <div class="filter-label">Filter by day:</div>
              <div class="day-filters" id="day-filters">
                <button class="day-filter active" data-day="">All Days</button>
                <button class="day-filter" data-day="Monday">Monday</button>
                <button class="day-filter" data-day="Tuesday">Tuesday</button>
                <button class="day-filter" data-day="Wednesday">
                  Wednesday
                </button>
                <button class="day-filter" data-day="Thursday">Thursday</button>
                <button class="day-filter" data-day="Friday">Friday</button>
                <button class="day-filter" data-day="Saturday">Saturday</button>
                <button class="day-filter" data-day="Sunday">Sunday</button>
              </div>
            </div>

            <!-- Time Filter -->
            <div class="filter-container time-filter-container">
              <div class="filter-label">Filter by time:</div>
              <div class="time-filters">
                <button class="time-filter active" data-time="">
                  All Times
                </button>
                <button class="time-filter" data-time="morning">
                  Before School
                </button>
                <button class="time-filter" data-time="afternoon">
                  After School
                </button>
                <button class="time-filter" data-time="weekend">Weekend</button>
              </div>
            </div>
          </aside>

          <!-- Activities Content -->
          <div class="activities-content">
            <div id="activities-list">
              <!-- Activities will be loaded here -->
              <p>Loading activities...</p>
            </div>
            <div id="message" class="hidden message"></div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2023 Mergington High School</p>
    </footer>

    <!-- Registration Modal -->
    <div id="registration-modal" class="modal hidden">
      <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h3>Register for <span id="modal-activity-name"></span></h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input
              type="email"
              id="email"
              required
              placeholder="your-email@mergington.edu"
            />
          </div>
          <input type="hidden" id="activity" value="" />
          <button type="submit">Register</button>
        </form>
      </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="modal hidden">
      <div class="modal-content">
        <span class="close-login-modal">&times;</span>
        <h3>Teacher Login</h3>
        <form id="login-form">
          <div class="form-group">
            <label for="username">Username:</label>
            <input
              type="text"
              id="username"
              required
              placeholder="Enter your username"
            />
          </div>
          <div class="form-group">
            <label for="password">Password:</label>
            <input
              type="password"
              id="password"
              required
              placeholder="Enter your password"
            />
          </div>
          <button type="submit">Login</button>
        </form>
        <div id="login-message" class="hidden message"></div>
      </div>
    </div>

    <script src="app.js"></script>
    <script>
      // Animated Git-style branch lines background
      (function () {
        const canvas = document.getElementById("git-bg-canvas");
        const ctx = canvas.getContext("2d");

        let resizeTimer;
        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = Math.max(document.documentElement.scrollHeight, window.innerHeight);
        }
        resize();
        window.addEventListener("resize", () => {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(() => {
            resize();
            buildNodes();
          }, 150);
        });

        // Branch definitions: col position and colors
        const BRANCH_DEFS = [
          { col: 3, lineColor: "rgba(90, 158, 0, 0.18)", dotColor: "rgba(90, 158, 0, 0.5)" },
          { col: 1, lineColor: "rgba(118, 196, 0, 0.14)", dotColor: "rgba(118, 196, 0, 0.4)" },
          { col: 5, lineColor: "rgba(61, 110, 0, 0.16)", dotColor: "rgba(61, 110, 0, 0.45)" },
          { col: 2, lineColor: "rgba(74, 171, 0, 0.12)", dotColor: "rgba(74, 171, 0, 0.35)" },
          { col: 6, lineColor: "rgba(118, 196, 0, 0.14)", dotColor: "rgba(118, 196, 0, 0.4)" },
        ];

        const COLS = 8;
        const MAX_ROWS = 60; // Pre-generate enough rows to cover any viewport
        const NODE_SPACING = 60;

        // Pre-generate branch patterns once at startup (deterministic across resizes)
        const branchPatterns = BRANCH_DEFS.map((b) => {
          const rows = [];
          for (let row = 0; row < MAX_ROWS; row++) {
            const hasBranch = Math.random() < 0.12;
            rows.push({
              showDot: row % 4 === 0,
              branchOffset: hasBranch ? (Math.random() < 0.5 ? -1 : 1) : 0,
            });
          }
          return rows;
        });

        const nodes = [];

        function buildNodes() {
          nodes.length = 0;
          const rows = Math.min(Math.ceil(canvas.height / NODE_SPACING) + 2, MAX_ROWS);

          BRANCH_DEFS.forEach((b, bi) => {
            for (let row = 0; row < rows; row++) {
              const pattern = branchPatterns[bi][row];
              const branchCol = b.col + pattern.branchOffset;
              nodes.push({
                col: b.col,
                row,
                lineColor: b.lineColor,
                dotColor: b.dotColor,
                showDot: pattern.showDot,
                branchTo: pattern.branchOffset !== 0 && branchCol >= 1 && branchCol <= COLS
                  ? branchCol
                  : null,
              });
            }
          });
        }

        buildNodes();

        const colSpacing = () => canvas.width / (COLS + 1);
        let t = 0;
        function draw() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          const cs = colSpacing();

          nodes.forEach((node) => {
            const x = node.col * cs;
            const y1 = node.row * NODE_SPACING;
            const y2 = y1 + NODE_SPACING;

            // Animated "wave" traveling down the branches
            const wave = Math.sin(t * 0.015 + node.row * 0.3 + node.col) * 0.5 + 0.5;
            ctx.globalAlpha = 0.5 + wave * 0.5;

            ctx.strokeStyle = node.lineColor;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x, y1);

            if (node.branchTo) {
              // Draw a curved branch line
              const x2 = node.branchTo * cs;
              ctx.bezierCurveTo(x, y1 + NODE_SPACING * 0.5, x2, y1 + NODE_SPACING * 0.5, x2, y2);
            } else {
              ctx.lineTo(x, y2);
            }
            ctx.stroke();

            // Draw commit dots at pre-determined rows
            if (node.showDot) {
              ctx.globalAlpha = 0.6 + wave * 0.4;
              ctx.fillStyle = node.dotColor;
              ctx.beginPath();
              ctx.arc(x, y1 + NODE_SPACING * 0.5, 4, 0, Math.PI * 2);
              ctx.fill();
            }
          });

          ctx.globalAlpha = 1;
          t++;
          requestAnimationFrame(draw);
        }

        draw();
      })();
    </script>
  </body>
</html>
